name: Aero Autonomous Evolution

# Autonomously re-derives the Aero language data tables from the real source
# corpus and proposes the result for review. The optimization is deterministic
# and test-gated, and it is published to a dedicated review branch
# (aero-auto/evolution) as a pull request — it is NEVER pushed to the default
# branch. A human merges the PR.
on:
  workflow_dispatch:
    inputs:
      cadence:
        description: "Optimization soak budget (the loop converges well before this)"
        type: choice
        required: true
        default: "10 minutes"
        options:
          - "4 minutes"
          - "10 minutes"
          - "20 minutes"
          - "1 hour"
          - "6 hours"
  schedule:
    # Autonomous periodic fallback cadence (Runs every 6 hours)
    - cron: "0 */6 * * *"

# Branch pushes + PR creation. Note: NO direct write to the default branch is
# performed by this workflow; the publish step targets a review branch only.
permissions:
  contents: write
  pull-requests: write

# Never let two evolution runs overlap concurrently.
concurrency:
  group: aero-evolution
  cancel-in-progress: false

env:
  AERO_AUTO_BRANCH: aero-auto/evolution

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - name: 🔄 Checkout main branch baseline
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AERO_PAT }}

      - name: 🐍 Set up Python Execution Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🧑‍🔧 Configure automation git identity
        run: |
          git config user.name  "aero-evolution-bot"
          git config user.email "aero-evolution-bot@users.noreply.github.com"

      - name: 🏗️ Stage-0 self-replication build (sanity)
        working-directory: aero_auto_sdk
        run: python aero.py build

      - name: 🚀 Deterministic, test-gated optimization pass
        working-directory: aero_auto_sdk
        env:
          CADENCE: ${{ github.event.inputs.cadence || '10 minutes' }}
          PYTHONUNBUFFERED: "1"
        run: |
          case "$CADENCE" in
            "4 minutes")  SOAK=240 ;;
            "10 minutes") SOAK=600 ;;
            "20 minutes") SOAK=1200 ;;
            "1 hour")     SOAK=3600 ;;
            "6 hours")    SOAK=21600 ;;
            *)            SOAK=600 ;;
          esac
          echo "Selected cadence '$CADENCE' -> soak upper bound: ${SOAK}s"
          # --publish commits + pushes any VERIFIED gain to the review branch.
          # evolve.py hard-refuses to publish to a protected/default branch.
          python evolve.py --soak-seconds "$SOAK" --publish --branch "$AERO_AUTO_BRANCH"

      - name: 🔬 Final compiler suite (must be green)
        working-directory: aero_auto_sdk
        run: python test_phase2.py

      - name: 🔁 Open or update the review pull request
        env:
          GH_TOKEN: ${{ secrets.AERO_PAT }}
        run: |
          set -euo pipefail

          BRANCH="$AERO_AUTO_BRANCH"

          # If evolve.py found no gain, the review branch won't have been
          # pushed/updated — nothing to propose.
          if [ -z "$(git ls-remote --heads origin "$BRANCH")" ]; then
            echo "No optimization gain to publish; review branch absent. Done."
            exit 0
          fi

          existing="$(gh pr list --head "$BRANCH" --base main --state open \
                      --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for '$BRANCH'; new commits are attached automatically."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "auto(sdk): deterministic frequency-tuned spec + regenerated lexer" \
              --body "Automated, deterministic optimization pass (test-gated). Re-derives the language spec from the live corpus and regenerates the lexer from it. **Review before merging into main.**"
          fi

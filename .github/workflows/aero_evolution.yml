name: Aero Autonomous Evolution

# Autonomously re-optimizes the Aero language data tables and publishes the
# result back to `main` — but STRICTLY scoped to the aero_auto_sdk/ folder
# and gated by the full compiler test suite.
on:
  workflow_dispatch:
    inputs:
      cadence:
        description: "Optimization cadence (controls the true un-capped soak runtime budget)"
        type: choice
        required: true
        default: "10 minutes"
        options:
          - "4 minutes"
          - "10 minutes"
          - "20 minutes"
          - "1 hour"
          - "6 hours"
  schedule:
    # Autonomous periodic fallback cadence (Runs every 6 hours)
    - cron: "0 */6 * * *"

# Write access is required for the autonomous push layers.
permissions:
  contents: write

# Never let two evolution runs overlap concurrently.
concurrency:
  group: aero-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 380
    
    steps:
      - name: 🔄 Checkout main branch baseline
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AERO_PAT }}

      - name: 🐍 Set up Python Execution Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔐 Pre-Flight Git Write Access Canary Check
        run: |
          set -euo pipefail
          echo "🌐 Checking push credentials before running optimization loops..."
          git config user.name  "aero-evolution-bot"
          git config user.email "aero-evolution-bot@users.noreply.github.com"
          
          # Write a small canary timestamp file to verify permissions instantly
          mkdir -p aero_auto_sdk/config
          echo "{\"canary_timestamp\": $(date +%s)}" > aero_auto_sdk/config/canary.json
          
          git add aero_auto_sdk/config/canary.json
          git commit -m "ci(canary): verify upstream repository write access permissions"
          git push origin HEAD:main
          echo "🎯 Canary verification passed! Write access confirmed in under 10 seconds."

      - name: 🏗️ Stage-0 self-replication build
        working-directory: aero_auto_sdk
        run: python aero.py build

      - name: 🚀 Autonomous optimization pass (test-gated, telemetry to summary)
        working-directory: aero_auto_sdk
        env:
          CADENCE: ${{ github.event.inputs.cadence || '10 minutes' }}
          # 👇 FORCES PYTHON TO LOG LIVE TELEMETRY LINE-BY-LINE INSTANTLY
          PYTHONUNBUFFERED: "1"
        run: |
          case "$CADENCE" in
            "4 minutes")  SOAK=240 ;;
            "10 minutes") SOAK=600 ;;
            "20 minutes") SOAK=1200 ;;
            "1 hour")     SOAK=3600 ;;
            "6 hours")    SOAK=21600 ;;
            *)            SOAK=600 ;;
          esac
          echo "Selected cadence '$CADENCE' -> soaking for the true un-capped duration: ${SOAK}s"
          python evolve.py --soak-seconds "$SOAK"

      - name: 🔬 Final compiler suite (must be green before any publish)
        working-directory: aero_auto_sdk
        run: python test_phase2.py

      - name: 📤 Publish — commit & push STRICTLY scoped to aero_auto_sdk/
        run: |
          set -euo pipefail

          # Stage all modifications inside the SDK directory context safely
          git add aero_auto_sdk/

          if git diff --cached --quiet; then
            echo "No optimization change to publish; nothing to commit."
            exit 0
          fi

          # SAFETY RAIL: abort the push if ANY staged path escapes aero_auto_sdk/.
          staged="$(git diff --cached --name-only)"
          echo "Staged paths:"
          echo "$staged"
          if echo "$staged" | grep -vqE '^aero_auto_sdk/'; then
            echo "::error::Refusing to push — staged changes escape aero_auto_sdk/."
            exit 1
          fi

          git config user.name  "aero-evolution-bot"
          git config user.email "aero-evolution-bot@users.noreply.github.com"
          git commit -m "auto(sdk): optimize internal language data structures and intent generation layers"
          git push origin HEAD:main
